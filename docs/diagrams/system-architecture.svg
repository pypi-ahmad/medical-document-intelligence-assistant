<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="740" viewBox="0 0 1400 740">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .title { font: 700 20px 'IBM Plex Sans', sans-serif; fill: #0f172a; }
      .label { font: 500 14px 'IBM Plex Sans', sans-serif; fill: #0f172a; }
      .line { stroke: #0f766e; stroke-width: 2.5; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect class="box" x="40" y="80" width="220" height="90"/>
  <text class="title" x="70" y="120">Frontend</text>
  <text class="label" x="70" y="145">Next.js Dashboard + Chat</text>

  <rect class="box" x="330" y="70" width="300" height="110"/>
  <text class="title" x="360" y="115">FastAPI API Layer</text>
  <text class="label" x="360" y="140">Auth, Uploads, Search, QA, Reports</text>

  <rect class="box" x="720" y="40" width="300" height="170"/>
  <text class="title" x="750" y="85">LangGraph Supervisor</text>
  <text class="label" x="750" y="112">OCR / Entity / Retrieval / QA</text>
  <text class="label" x="750" y="134">Timeline / Summary / Report / Memory</text>

  <rect class="box" x="1090" y="60" width="250" height="110"/>
  <text class="title" x="1120" y="105">Local Ollama</text>
  <text class="label" x="1120" y="130">GLM OCR + LLM + Embedding</text>

  <rect class="box" x="700" y="300" width="280" height="120"/>
  <text class="title" x="730" y="345">PostgreSQL + pgvector</text>
  <text class="label" x="730" y="370">OCR pages, entities, chunks, chats</text>

  <rect class="box" x="1040" y="310" width="300" height="110"/>
  <text class="title" x="1070" y="355">Encrypted Local Storage</text>
  <text class="label" x="1070" y="380">Uploaded documents + artifacts</text>

  <rect class="box" x="300" y="320" width="320" height="110"/>
  <text class="title" x="330" y="365">Observability Stack</text>
  <text class="label" x="330" y="390">OTel, Prometheus, Grafana, Loki</text>

  <line class="line" x1="260" y1="125" x2="330" y2="125"/>
  <line class="line" x1="630" y1="125" x2="720" y2="125"/>
  <line class="line" x1="1020" y1="120" x2="1090" y2="120"/>
  <line class="line" x1="860" y1="210" x2="840" y2="300"/>
  <line class="line" x1="970" y1="210" x2="1130" y2="310"/>
  <line class="line" x1="500" y1="180" x2="460" y2="320"/>
</svg>
